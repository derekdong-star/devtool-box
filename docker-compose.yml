services:
  devtoolbox:
    build: .
    container_name: devtoolbox
    ports:
      - "8090:8080"
    volumes:
      # 持久化命令模板和连接配置到宿主机 ./data 目录
      - ./data:/app/data
    restart: unless-stopped
    environment:
      # 数据目录（容器内）
      - DATA_DIR=/app/data
      # 认证配置：如需启用登录，在 .env 中设置 AUTH_USER / AUTH_PASSWORD / SESSION_SECRET
      # 未设置时认证关闭，适合本地开发；生产环境务必配置强密码和随机 SESSION_SECRET
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - AUTH_SESSION_TTL=${AUTH_SESSION_TTL:-12h}
