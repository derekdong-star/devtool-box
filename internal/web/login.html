<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevToolbox 登录</title>
<link rel="stylesheet" href="/static/css/main.css">
<style>
body { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, var(--surface-alt), var(--bg)); }
.login-card { width: min(420px, calc(100vw - 32px)); background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 28px; display: flex; flex-direction: column; gap: 16px; }
.login-title { font-size: 22px; font-weight: 800; color: var(--text); }
.login-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: -8px; }
.login-field { display: flex; flex-direction: column; gap: 7px; }
.login-field label { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
.login-error { display: none; color: var(--danger); font-size: 12px; background: var(--danger-light); border-radius: var(--radius); padding: 8px 10px; }
</style>
</head>
<body>
  <form class="login-card" onsubmit="login(event)">
    <div class="login-title">DevToolbox</div>
    <div class="login-subtitle">远程访问需要登录认证</div>

    <div class="login-field">
      <label for="user">用户名</label>
      <input id="user" autocomplete="username" autofocus placeholder="admin">
    </div>
    <div class="login-field">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="输入密码">
    </div>
    <div id="loginError" class="login-error"></div>
    <button class="btn btn-primary" type="submit" style="height:38px">登录</button>
  </form>

<script>
async function login(e) {
  e.preventDefault();
  const error = document.getElementById('loginError');
  error.style.display = 'none';
  const user = document.getElementById('user').value.trim();
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user, password })
  }).then(r => r.json()).catch(() => ({ code: -1, msg: '网络错误' }));
  if (res.code === 0) {
    location.href = '/';
    return;
  }
  error.textContent = res.msg || '登录失败';
  error.style.display = 'block';
}
</script>
</body>
</html>
